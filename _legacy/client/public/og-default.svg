<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <rect width="1200" height="630" fill="#0a0e1a"/>
  <!-- Stars -->
  <g opacity="0.4">
    <circle cx="100" cy="80" r="1.2" fill="white"/>
    <circle cx="250" cy="150" r="0.8" fill="white"/>
    <circle cx="400" cy="50" r="1" fill="white"/>
    <circle cx="550" cy="200" r="0.6" fill="white"/>
    <circle cx="700" cy="100" r="1.1" fill="white"/>
    <circle cx="850" cy="180" r="0.9" fill="white"/>
    <circle cx="1000" cy="70" r="1.3" fill="white"/>
    <circle cx="1100" cy="250" r="0.7" fill="white"/>
    <circle cx="150" cy="300" r="0.8" fill="white"/>
    <circle cx="300" cy="400" r="1.0" fill="white"/>
    <circle cx="500" cy="350" r="0.6" fill="white"/>
    <circle cx="150" cy="500" r="0.9" fill="white"/>
  </g>
  <!-- Orbit ring -->
  <circle cx="850" cy="315" r="250" fill="none" stroke="#c8a030" stroke-width="0.5" opacity="0.1"/>
  <circle cx="850" cy="315" r="180" fill="none" stroke="#c8a030" stroke-width="0.5" opacity="0.08"/>
  <!-- Moon glow -->
  <circle cx="900" cy="280" r="120" fill="url(#moonGlow)" opacity="0.3"/>
  <!-- Crescent moon -->
  <circle cx="900" cy="280" r="80" fill="#1a1510"/>
  <path d="M 900 200 A 80 80 0 0 1 900 360 A 50 80 0 0 0 900 200 Z" fill="#c8a030" opacity="0.85"/>
  <!-- Text -->
  <text x="80" y="260" font-family="serif" font-size="72" font-weight="300" fill="#e8d5a0" letter-spacing="2">Hilal Vision</text>
  <text x="82" y="310" font-family="sans-serif" font-size="22" fill="#8a7a5a" letter-spacing="1">Islamic Moon Visibility &amp; Sighting Platform</text>
  <!-- Tagline -->
  <text x="82" y="370" font-family="sans-serif" font-size="16" fill="#5a5040">
    Crescent predictions · 3D Globe · Hijri Calendar · Horizon Simulator
  </text>
  <!-- Bottom bar -->
  <rect x="0" y="590" width="1200" height="40" fill="#c8a030" opacity="0.08"/>
  <text x="600" y="616" font-family="sans-serif" font-size="14" fill="#c8a030" text-anchor="middle" opacity="0.6">moonsighting.live</text>
  <defs>
    <radialGradient id="moonGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#c8a030" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#c8a030" stop-opacity="0"/>
    </radialGradient>
  </defs>
</svg>
